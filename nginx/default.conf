upstream frontend_upstream { server frontend:80; }
upstream backend_upstream { server backend:8000; }

limit_req_zone $binary_remote_addr zone=chat_rate:10m rate=12r/m;
limit_req_zone $binary_remote_addr zone=feedback_rate:10m rate=30r/m;
limit_req_status 429;

map $host $block_external_admin {
    default 1;
    localhost 0;
    127.0.0.1 0;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 20m;

    location = /api/chat {
        limit_req zone=chat_rate burst=5 nodelay;
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location = /api/feedback {
        limit_req zone=feedback_rate burst=10 nodelay;
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/(?:data-gaps|crawler|index|enrichment|codex)(?:/|$) {
        if ($block_external_admin) { return 404; }
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location ~ ^/api/notices/[0-9]+/(?:reprocess|codex-queue)$ {
        if ($block_external_admin) { return 404; }
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
